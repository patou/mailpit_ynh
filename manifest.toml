#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "mailpit"
name = "Mailpit"
description.en = "Modern SMTP testing server with web UI to inspect captured emails"
description.fr = "Serveur SMTP de test moderne avec interface web pour inspecter les emails"

version = "1.30.5~ynh1"

maintainers = ["patou"]

[upstream]
license = "MIT"
website = "https://mailpit.axllent.org"
admindoc = "https://mailpit.axllent.org/docs/"
code = "https://github.com/axllent/mailpit"

[integration]
yunohost = ">= 12.1.40"
helpers_version = "2.1"
architectures = ["amd64", "i386", "armhf", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "80M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/mailpit"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

[resources]

    [resources.sources.main]
    format = "tar.gz"
    extract = true
    in_subdir = false

        [resources.sources.main.amd64]
        url = "https://github.com/axllent/mailpit/releases/download/v1.30.5/mailpit-linux-amd64.tar.gz"
        sha256 = "b1499b23e6207d2728a0f154fd27370d0f608dd8ae1a63b734d089dc7f7a8d6f"

        [resources.sources.main.i386]
        url = "https://github.com/axllent/mailpit/releases/download/v1.30.5/mailpit-linux-386.tar.gz"
        sha256 = "fa9ad106b86c54aefd9802fd1483d90ec07f82badfabffdedfc551466f094c40"

        [resources.sources.main.armhf]
        url = "https://github.com/axllent/mailpit/releases/download/v1.30.5/mailpit-linux-arm.tar.gz"
        sha256 = "d08f4e80c180a38c7787e6234f3d0fcd3a089d0061e2b0871fbe866d5d759db5"

        [resources.sources.main.arm64]
        url = "https://github.com/axllent/mailpit/releases/download/v1.30.5/mailpit-linux-arm64.tar.gz"
        sha256 = "c4c0a587770af1d5fb192e7b580aebfc03115c93da2af308a4b2e227c7d06cd2"

        [resources.sources.main.autoupdate]
        strategy = "latest_github_release"
        asset.amd64 = "mailpit-linux-amd64.tar.gz"
        asset.i386 = "mailpit-linux-386.tar.gz"
        asset.armhf = "mailpit-linux-arm.tar.gz"
        asset.arm64 = "mailpit-linux-arm64.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 8025
    smtp.default = 1025
    smtp.exposed = "TCP"
